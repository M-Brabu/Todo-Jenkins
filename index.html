<!DOCTYPE html>
<html>
<head>
  <title>To-Do App</title>
  <link rel="stylesheet" href="style.css">
</head>

<body onload="loadTasks()">

<!-- LOGIN -->
<div id="loginPage" class="card">
  <h2>To Do App</h2>

  <p>Username: <b>brabu</b></p>
  <p>Password: <b>1234</b></p>

  <input id="username" placeholder="Username">
  <input id="password" type="password" placeholder="Password">
  <button onclick="login()">Login</button>
  <p id="error"></p>
</div>

<!-- APP -->
<div id="appPage" class="card hidden">
  <h2>My Tasks ✨</h2>

  <button onclick="toggleMode()" id="modeBtn">🌙 Dark Mode</button>

  <div class="tabs">
    <button onclick="showTab('all')">All</button>
    <button onclick="showTab('completed')">Completed</button>
    <button onclick="showTab('incomplete')">Incomplete</button>
  </div>

  <input id="taskInput" placeholder="Enter task...">
  <button onclick="addTask()">Add Task</button>

  <ul id="list"></ul>
</div>

<script src="script.js"></script>
</body>
</html>
